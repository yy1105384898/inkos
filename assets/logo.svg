  <path d="M190 372 H322" stroke="#f8d26a" stroke-width="10" stroke-linecap="round" opacity="0.72"/>

  <text x="256" y="424" text-anchor="middle"
        font-family="Georgia, 'Noto Serif', 'Times New Roman', serif"
        font-size="34" font-weight="bold" letter-spacing="4"
        fill="#f8d26a">YANGYANG</text>
