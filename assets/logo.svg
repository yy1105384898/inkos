      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="256" cy="256" r="238" fill="url(#bg)" stroke="#f59e0b" stroke-width="3"/>
  <circle cx="256" cy="256" r="205" fill="none" stroke="#f8d26a" stroke-width="1.5" stroke-dasharray="10 12" opacity="0.28"/>

